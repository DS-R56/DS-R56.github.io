<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🎵 My Song List</title>
    <meta name="description" content="나만의 노래 리스트 - 검색, 즐겨찾기, 가사 보기, 랜덤 추천">
    <meta name="theme-color" content="#0f0c29" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f0f2f5" media="(prefers-color-scheme: light)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta property="og:title" content="🎵 My Song List">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://docs.google.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script defer src="script.js"></script>
</head>
<body>

<!-- ╔═══════════════════════════════════════╗
     ║       로그인 화면                      ║
     ╚═══════════════════════════════════════╝ -->
<div id="loginScreen" class="login-screen">
    <div class="login-box" id="loginBox">

        <!-- ── 상태 1: 아이디 입력 (기본) ── -->
        <div id="loginStep" class="login-step">
            <div class="login-icon">🎤</div>
            <h1 class="login-title">My Song List</h1>
            <p class="login-desc">아이디를 입력하여 나만의 즐겨찾기를 관리하세요</p>

            <div class="login-form">
                <input type="text" id="userIdInput"
                       placeholder="아이디 입력 (영문, 한글, 숫자)"
                       maxlength="20" autocomplete="off" spellcheck="false">
                <button id="loginBtn" class="login-btn">시작하기</button>
            </div>

            <button id="guestBtn" class="guest-btn">👤 게스트로 둘러보기</button>

            <!-- 에러 메시지 -->
            <div id="loginError" class="login-error" style="display:none;"></div>

            <!-- 로딩 -->
            <div id="loginLoading" class="login-loading" style="display:none;">
                <div class="spinner-small"></div>
                <span>확인 중...</span>
            </div>
        </div>

        <!-- ── 상태 2: 아이디 생성 확인 ── -->
        <div id="createStep" class="login-step" style="display:none;">
            <div class="create-icon">🆕</div>
            <h2 class="create-heading">아이디가 존재하지 않습니다</h2>

            <div class="create-id-box">
                <span class="create-id-label">입력한 아이디</span>
                <span class="create-id-value" id="createIdDisplay"></span>
            </div>

            <p class="create-question">이 아이디로 새 즐겨찾기 리스트를 만들까요?</p>

            <div class="create-actions">
                <button id="createConfirmBtn" class="create-confirm-btn">✅ 새로 만들기</button>
                <button id="createCancelBtn" class="create-cancel-btn">← 돌아가기</button>
            </div>

            <!-- 생성 중 로딩 -->
            <div id="createLoading" class="login-loading" style="display:none;">
                <div class="spinner-small"></div>
                <span>아이디 생성 중...</span>
